# Flat Harbor config fragment for SWE-style tasks.
#
# Usage:
#   --custom-config-path slime/examples/harbor/swe_harbor.yaml
#
# Keys in this file are loaded onto `args` directly by slime's argument parser.

# Shared autonomy environment settings
env_provider: podman
env_provider_kwargs:
  dns:
    - "8.8.8.8"
    - "8.8.4.4"
  compose_up_timeout: 900
  memory: 4096
trials_dir: /tmp/slime_trials
rollout_max_turns: 50

# Harbor task/runtime behavior
replay_ground_truth: false
cleanup_container: true
cleanup_local: true

# Harbor proxy defaults
agent_name: codex
agent_url_env: OPENAI_BASE_URL
agent_timeout_s: 1800
harbor_proxy_port_base: 19000
harbor_n_concurrent_tasks: 16
harbor_proxy_host: null
harbor_agent_env:
  OPENAI_API_KEY: "proxy-key"
  OPENAI_BASE_URL: ""   # will be overwritten by the pro

